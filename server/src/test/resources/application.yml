spring:
  datasource:
    url: jdbc:h2:mem:blogi-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
  sql:
    init:
      mode: always

server:
  port: 0

blogi:
  security:
    jwt-secret: test-secret-for-jwt-signing-1234567890
    jwt-expiration-seconds: 3600
  upload:
    storage: LOCAL
    max-size-bytes: 5242880
    local:
      root-dir: ./target/test-uploads
      public-path: /uploads
