spring:
  application:
    name: blogi-server
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:blogi}
    username: ${POSTGRES_USER:blogi}
    password: ${POSTGRES_PASSWORD:blogi}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:blogi}
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 6MB

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

blogi:
  security:
    jwt-secret: ${JWT_SECRET:change-me-to-a-long-random-string}
    jwt-expiration-seconds: ${JWT_EXPIRATION:86400}
  upload:
    storage: ${UPLOAD_STORAGE:LOCAL}
    max-size-bytes: ${UPLOAD_MAX_SIZE_BYTES:5242880}
    allowed-content-types: ${UPLOAD_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,image/gif}
    local:
      root-dir: ${UPLOAD_LOCAL_ROOT_DIR:./data/uploads}
      public-path: ${UPLOAD_LOCAL_PUBLIC_PATH:/uploads}
    s3:
      endpoint: ${UPLOAD_S3_ENDPOINT:}
      region: ${UPLOAD_S3_REGION:us-east-1}
      bucket: ${UPLOAD_S3_BUCKET:}
      access-key: ${UPLOAD_S3_ACCESS_KEY:}
      secret-key: ${UPLOAD_S3_SECRET_KEY:}
      prefix: ${UPLOAD_S3_PREFIX:blogi}
      public-base-url: ${UPLOAD_S3_PUBLIC_BASE_URL:}
      path-style-access: ${UPLOAD_S3_PATH_STYLE_ACCESS:true}
    webdav:
      base-url: ${UPLOAD_WEBDAV_BASE_URL:}
      username: ${UPLOAD_WEBDAV_USERNAME:}
      password: ${UPLOAD_WEBDAV_PASSWORD:}
      prefix: ${UPLOAD_WEBDAV_PREFIX:blogi}
      public-base-url: ${UPLOAD_WEBDAV_PUBLIC_BASE_URL:}
