services:
  postgres:
    image: postgres:17-alpine
    container_name: blogi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blogi}
      POSTGRES_USER: ${POSTGRES_USER:-blogi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blogi}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: blogi-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-blogi}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
